<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <title>To Go</title>
</head>
<body>
    <header>
        <div>
            <h1>Lorem</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="togo.html">To go</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="form-flex">
            <div>
                <img src="steak.jpg" alt="Steak">       
            </div>
            <div class="form-container">
                <h2>Perfect Steak</h2>        
                <form>
                    <div class="input-container">
                        <label for="size">Size:</label>
                        <select id="size" name="size">
                            <option value="small">Small</option>
                            <option value="medium">Medium</option>
                            <option value="large">Large</option>
                        </select>
                    </div>
                    <div class="input-container">
                        <label for="price">Price:</label>
                        <input type="number" id="price" name="price"/>
                    </div>
                    <div class="input-container">
                        <label for="quantity">Quantity:</label>
                        <input type="number" id="quantity" name="quantity"/>
                    </div>
                    <div class="input-container">
                        <label for="description">Description:</label>
                        <textarea id="description" name="description"></textarea>
                    </div>
                    <button class="btn">Add</button>

                    <h3>Payment Information</h3>
                    <div class="input-container">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Name on Card">
                    </div>
                    <div class="input-container">
                        <label for="card">Card</label>
                        <input type="text" id="card" name="card" placeholder="1234 5678 9012 3456">
                    </div>
                    <div class="payment-row">
                        <div class="input-container">
                            <label for="exp">Exp</label>
                            <input type="text" id="exp" name="exp" placeholder="MM/YY">
                        </div>
                        <div class="input-container">
                            <label for="cvv">CVV</label>
                            <input type="text" id="cvv" name="cvv" placeholder="1234">
                        </div>                        
                    </div>
                    <button class="btn">Complete Order</button>
                </form>
        </div>
    </main>
    </body>
</html>
