<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container{
            display: flex;
            height: 400px;
            background-color: #dedede;
            flex-direction: row;
            /*flex-direction help us to change the direction of the elements (row is default)*/
            justify-content: center;
            /*flex-direction row, then justify-content organize the elements horizontally
            if flex-direction column, then justify content -> vertically
            */
            align-items: flex-end;
            /*when flex-direction: row -> align-itms organie vertically, when flex-direction:column, it organize elements horizontally*/
        }
        .flex-child{
            padding:30px;
            margin: 10px;
            text-align: center;
            background-color: #444444;
            color:white;
        }
        .grid-container{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            background-color: rgb(171, 208, 240);
            height: 400px;
            gap: 30px;
        }

        .grid-child{
            padding: 30px;
            margin: 3px;
            text-align: center;
            background-color: bisque;
        }

    </style>
</head>
<body>
    <h1>Layout practice</h1>

    <h2>Flexbox</h2>
    <!-- Flex practice -->
    <section class="flex-container">
        <div class="flex-child">A</div>
        <div class="flex-child">B</div>
        <div class="flex-child">C</div>
    </section>

    <h2>Grid</h2>
    <section class="grid-container">
        <div class="grid-child">1</div>
        <div class="grid-child">2</div>
        <div class="grid-child">3</div>

    </section>

</body>
</html>
